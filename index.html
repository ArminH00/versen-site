<!DOCTYPE html>
<html>

<head>

<title>Versen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter', sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
z-index:100;
}

.logo{
font-size:22px;
font-weight:700;
letter-spacing:2px;
}

.menu{
display:flex;
gap:40px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
opacity:0.8;
transition:0.3s;
}

.menu a:hover{
opacity:1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:90px;
font-weight:700;
letter-spacing:-3px;
}

.hero p{
margin-top:20px;
font-size:22px;
opacity:0.7;
}

/* BUTTON */

.cta{
margin-top:40px;
padding:18px 50px;
border-radius:40px;
border:none;
background:white;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.cta:hover{
transform:scale(1.08);
}

/* BACKGROUND GLOW */

.glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
filter:blur(120px);
top:30%;
left:50%;
transform:translateX(-50%);
}

</style>

</head>


<body>

<div class="nav">

<div class="logo">VERSEN</div>

<div class="menu">
<a href="#">Shop</a>
<a href="#">Membership</a>
<a href="#">Account</a>
</div>

</div>


<div class="hero">

<div class="glow"></div>

<h1>Members Only Prices</h1>

<p>Access products cheaper than anywhere else</p>

<button class="cta">Start Membership</button>

</div>

</body>
</html>
