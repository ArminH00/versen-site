<!DOCTYPE html>
<html lang="sv">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Versen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter', sans-serif;
background:#0a0a0a;
color:white;
}

/* NAVBAR */

.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
z-index:100;
}

.logo{
font-size:20px;
font-weight:700;
letter-spacing:2px;
}

.menu{
display:flex;
gap:40px;
}

.menu a{
text-decoration:none;
color:white;
opacity:0.7;
transition:0.3s;
}

.menu a:hover{
opacity:1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 20px;
}

.hero h1{
font-size:72px;
max-width:800px;
line-height:1.1;
}

.hero p{
margin-top:20px;
font-size:20px;
opacity:0.7;
max-width:600px;
}

/* KNAPP */

.cta{
margin-top:40px;
padding:18px 50px;
border-radius:50px;
border:none;
background:white;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.cta:hover{
transform:scale(1.07);
}

/* GLOW BAKGRUND */

.glow{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(255,255,255,0.12),transparent);
filter:blur(140px);
top:40%;
left:50%;
transform:translate(-50%,-50%);
z-index:0;
}

.hero *{
position:relative;
z-index:1;
}

</style>

</head>

<body>

<div class="nav">
<div class="logo">VERSEN</div>

<div class="menu">
<a href="#">Produkter</a>
<a href="#">Medlemskap</a>
<a href="#">Konto</a>
</div>
</div>

<div class="hero">

<div class="glow"></div>

<h1>Få tillgång till priser andra inte ser</h1>

<p>
Bli medlem och handla premiumprodukter billigare än i vanliga butiker.
</p>

<button class="cta">Starta medlemskap</button>

</div>

</body>
</html>
