<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<meta name="description" content="Versen intern admin dashboard.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://versen.se/A.admin63630325">
<meta property="og:locale" content="sv_SE">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Versen">
<meta property="og:title" content="Versen Admin">
<meta property="og:description" content="Versen intern admin dashboard.">
<meta property="og:url" content="https://versen.se/A.admin63630325">
<title>Versen Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css?v=20260513-admin-system-b">
</head>

<body class="admin-body">
<div class="admin-shell" data-admin-app>
  <section class="admin-login" data-admin-login>
    <div class="admin-login-panel">
      <span class="admin-kicker">Versen internal</span>
      <h1>Admin kontrollrum</h1>
      <p>Säker intern dashboard för orders, checkouts, medlemmar, support och aktivitet.</p>
      <form data-admin-login-form>
        <label for="adminCode">Adminkod</label>
        <input id="adminCode" name="code" type="password" inputmode="numeric" autocomplete="current-password" required>
        <button type="submit">Öppna dashboard</button>
      </form>
      <p class="admin-message" data-admin-login-message></p>
    </div>
  </section>

  <aside class="admin-sidebar" data-admin-sidebar hidden>
    <div class="admin-brand">
      <strong>VERSEN</strong>
      <span>God mode</span>
    </div>
    <nav class="admin-nav" aria-label="Admin navigation">
      <button class="active" type="button" data-admin-view="dashboard">Översikt</button>
      <button type="button" data-admin-view="orders">Ordrar</button>
      <button type="button" data-admin-view="checkouts">Lämnade Checkouts</button>
      <button type="button" data-admin-view="memberships">Medlemskap</button>
      <button type="button" data-admin-view="users">Användare</button>
      <button type="button" data-admin-view="support">Support</button>
      <button type="button" data-admin-view="returns">Returer</button>
      <button type="button" data-admin-view="settings">Inställningar</button>
      <button type="button" data-admin-view="activity">Loggar</button>
      <button type="button" data-admin-view="emails">Email / Notiser</button>
    </nav>
    <button class="admin-logout" type="button" data-admin-logout>Logga ut</button>
  </aside>

  <main class="admin-main" data-admin-main hidden>
    <header class="admin-topbar">
      <button class="admin-menu-button" type="button" data-admin-menu aria-label="Öppna meny">Menu</button>
      <div class="admin-topbrand" aria-label="Versen admin">
        <span class="admin-brand-mark" aria-hidden="true">V</span>
        <strong>versen</strong>
      </div>
      <nav class="admin-topnav" aria-label="Admin huvudnavigering">
        <button class="active" type="button" data-admin-view="dashboard">Översikt</button>
        <button type="button" data-admin-view="orders">Ordrar</button>
        <button type="button" data-admin-view="checkouts">Checkouts</button>
        <button type="button" data-admin-view="memberships">Medlemskap</button>
        <button type="button" data-admin-view="users">Kunder</button>
        <button type="button" data-admin-view="support">Support</button>
        <button type="button" data-admin-view="returns">Returer</button>
        <button type="button" data-admin-view="settings">Inställningar</button>
        <button type="button" data-admin-view="activity">Loggar</button>
        <button type="button" data-admin-view="emails">Email</button>
      </nav>
      <div class="admin-current-view">
        <span data-admin-section-label>Dashboard</span>
        <strong data-admin-title>Versen Admin</strong>
      </div>
      <form class="admin-search" data-admin-search>
        <input type="search" name="q" placeholder="Sök order, email, kund">
      </form>
      <button class="admin-refresh" type="button" data-admin-refresh>Uppdatera</button>
      <div class="admin-account-chip">
        <span class="admin-moon" aria-hidden="true">◐</span>
        <span class="admin-mobile-avatar" aria-hidden="true">AH</span>
        <strong>Armin Hurtic</strong>
        <button type="button" data-admin-logout aria-label="Logga ut">↧</button>
      </div>
    </header>

    <section class="admin-status-row" data-admin-status></section>
    <section class="admin-content" data-admin-content>
      <div class="admin-loading">Laddar kontrollrummet...</div>
    </section>
  </main>
</div>

<div class="admin-drawer" data-admin-drawer hidden>
  <button class="admin-drawer-backdrop" type="button" data-admin-drawer-close aria-label="Stäng"></button>
  <article class="admin-drawer-panel">
    <button class="admin-drawer-close" type="button" data-admin-drawer-close>Stäng</button>
    <div data-admin-drawer-content></div>
  </article>
</div>

<div class="admin-modal" data-admin-confirm hidden>
  <button class="admin-modal-backdrop" type="button" data-admin-confirm-cancel aria-label="Avbryt"></button>
  <article class="admin-modal-panel">
    <span>Bekräfta</span>
    <h2 data-admin-confirm-title>Är du säker?</h2>
    <p data-admin-confirm-copy>Den här åtgärden påverkar live-data.</p>
    <div class="admin-modal-actions">
      <button type="button" data-admin-confirm-cancel>Avbryt</button>
      <button class="danger" type="button" data-admin-confirm-ok>Bekräfta</button>
    </div>
  </article>
</div>

<div class="admin-toast" data-admin-toast hidden></div>
<script src="admin.js?v=20260513-admin-system-b"></script>
</body>
</html>
