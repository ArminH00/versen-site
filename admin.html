<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versen - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="nav">
  <a class="logo" href="index.html">VERSEN</a>

  <div class="menu" aria-label="Huvudmeny">
    <a href="index.html">Hem</a>
    <a href="produkter.html">Produkter</a>
    <a href="medlemskap.html">Medlemskap</a>
    <a href="konto.html">Konto</a>
    <a href="kundkorg.html">Kundkorg <span data-cart-count></span></a>
  </div>
</nav>

<main>
  <header class="page-hero fade">
    <div class="glow"></div>
    <div class="page-hero-content">
      <div class="badge">Admin</div>
      <h1>Medlemmar</h1>
      <p>Visa aktiva medlemmar taggade i Shopify. Sidan kräver adminnyckel från Vercel.</p>
    </div>
  </header>

  <section class="account-grid fade" aria-label="Adminyta">
    <article class="account-card login-card">
      <h2>Adminnyckel</h2>
      <form class="member-form" data-admin-form>
        <input type="password" name="adminSecret" placeholder="Adminnyckel" autocomplete="current-password" required>
        <button class="product-btn" type="submit">Visa medlemmar</button>
      </form>
      <p class="form-message" data-admin-message></p>
    </article>

    <article class="account-card order-card admin-card-wide">
      <h2>Aktiva medlemmar</h2>
      <div class="empty-state" data-admin-members>
        <span>Ingen data laddad</span>
        <p>Ange adminnyckel för att hämta listan från Shopify.</p>
      </div>
    </article>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
