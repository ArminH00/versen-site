<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<meta name="description" content="Versen intern admin dashboard.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://versen.se/A.admin63630325">
<meta property="og:locale" content="sv_SE">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Versen">
<meta property="og:title" content="Versen Admin">
<meta property="og:description" content="Versen intern admin dashboard.">
<meta property="og:url" content="https://versen.se/A.admin63630325">
<title>Versen Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css?v=20260513-admin-desktop-a">
</head>

<body class="admin-body">
<div class="admin-shell" data-admin-app>
  <section class="admin-login" data-admin-login>
    <div class="admin-login-panel">
      <span class="admin-kicker">Versen internal</span>
      <h1>Admin kontrollrum</h1>
      <p>Säker intern dashboard för orders, checkouts, medlemmar, support och aktivitet.</p>
      <form data-admin-login-form>
        <label for="adminCode">Adminkod</label>
        <input id="adminCode" name="code" type="password" inputmode="numeric" autocomplete="current-password" required>
        <button type="submit">Öppna dashboard</button>
      </form>
      <p class="admin-message" data-admin-login-message></p>
    </div>
  </section>

  <aside class="admin-sidebar" data-admin-sidebar hidden>
    <div class="admin-brand">
      <strong>VERSEN</strong>
      <span>God mode</span>
    </div>
    <nav class="admin-nav" aria-label="Admin navigation">
      <button class="active" type="button" data-admin-view="dashboard" data-icon="home">Översikt</button>
      <button type="button" data-admin-view="orders" data-icon="orders">Ordrar</button>
      <button type="button" data-admin-view="checkouts" data-icon="cart">Lämnade Checkouts</button>
      <button type="button" data-admin-view="memberships" data-icon="membership">Medlemskap</button>
      <button type="button" data-admin-view="users" data-icon="users">Användare</button>
      <button type="button" data-admin-view="support" data-icon="support">Support</button>
      <button type="button" data-admin-view="returns" data-icon="returns">Returer</button>
      <button type="button" data-admin-view="settings" data-icon="settings">Inställningar</button>
      <button type="button" data-admin-view="activity" data-icon="activity">Loggar</button>
      <button type="button" data-admin-view="emails" data-icon="mail">Email / Notiser</button>
    </nav>
    <button class="admin-logout" type="button" data-admin-logout>Logga ut</button>
  </aside>

  <main class="admin-main" data-admin-main hidden>
    <header class="admin-topbar">
      <button class="admin-menu-button" type="button" data-admin-menu aria-label="Öppna meny"><svg viewBox="0 0 24 24" width="17" height="17" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg></button>
      <div class="admin-topbrand" aria-label="Versen admin">
        <span class="admin-brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M5 5.5 10.2 19h3.6L19 5.5h-3.4L12 15.2 8.4 5.5H5Z" fill="currentColor"/></svg>
        </span>
        <strong>versen</strong>
      </div>
      <nav class="admin-topnav" aria-label="Admin huvudnavigering">
        <button class="active" type="button" data-admin-view="dashboard" data-icon="home">Översikt</button>
        <button type="button" data-admin-view="orders" data-icon="orders">Ordrar</button>
        <button type="button" data-admin-view="checkouts" data-icon="cart">Checkouts</button>
        <button type="button" data-admin-view="memberships" data-icon="membership">Medlemskap</button>
        <button type="button" data-admin-view="users" data-icon="users">Kunder</button>
        <button type="button" data-admin-view="support" data-icon="support">Support</button>
        <button type="button" data-admin-view="returns" data-icon="returns">Returer</button>
        <button type="button" data-admin-view="settings" data-icon="settings">Inställningar</button>
        <button type="button" data-admin-view="activity" data-icon="activity">Loggar</button>
        <button type="button" data-admin-view="emails" data-icon="mail">Email</button>
      </nav>
      <div class="admin-current-view">
        <span data-admin-section-label>Dashboard</span>
        <strong data-admin-title>Versen Admin</strong>
      </div>
      <form class="admin-search" data-admin-search>
        <input type="search" name="q" placeholder="Sök order, email, kund">
      </form>
      <button class="admin-refresh" type="button" data-admin-refresh><svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M21 12a9 9 0 0 1-15.4 6.36L3 16M3 12a9 9 0 0 1 15.4-6.36L21 8M3 16v5h5M21 8V3h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Uppdatera</button>
      <div class="admin-account-chip">
        <span class="admin-moon" aria-hidden="true"><svg viewBox="0 0 24 24" width="15" height="15" fill="none"><path d="M20.2 15.4A8.2 8.2 0 0 1 8.6 3.8 8.7 8.7 0 1 0 20.2 15.4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="admin-mobile-avatar" aria-hidden="true">AH</span>
        <strong>Armin Hurtic</strong>
        <button type="button" data-admin-logout aria-label="Logga ut"><svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M9 21H5.8A2.8 2.8 0 0 1 3 18.2V5.8A2.8 2.8 0 0 1 5.8 3H9M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </header>

    <section class="admin-status-row" data-admin-status></section>
    <section class="admin-content" data-admin-content>
      <div class="admin-loading">Laddar kontrollrummet...</div>
    </section>
  </main>
</div>

<div class="admin-drawer" data-admin-drawer hidden>
  <button class="admin-drawer-backdrop" type="button" data-admin-drawer-close aria-label="Stäng"></button>
  <article class="admin-drawer-panel">
    <div class="admin-drawer-toolbar">
      <button class="admin-drawer-close" type="button" data-admin-drawer-close><svg viewBox="0 0 24 24" width="15" height="15" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>Tillbaka</button>
      <button class="admin-drawer-overview" type="button" data-admin-drawer-overview><svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Översikt</button>
    </div>
    <div data-admin-drawer-content></div>
  </article>
</div>

<div class="admin-modal" data-admin-confirm hidden>
  <button class="admin-modal-backdrop" type="button" data-admin-confirm-cancel aria-label="Avbryt"></button>
  <article class="admin-modal-panel">
    <span>Bekräfta</span>
    <h2 data-admin-confirm-title>Är du säker?</h2>
    <p data-admin-confirm-copy>Den här åtgärden påverkar live-data.</p>
    <div class="admin-modal-actions">
      <button type="button" data-admin-confirm-cancel>Avbryt</button>
      <button class="danger" type="button" data-admin-confirm-ok>Bekräfta</button>
    </div>
  </article>
</div>

<div class="admin-toast" data-admin-toast hidden></div>
<script src="admin.js?v=20260513-admin-desktop-a"></script>
</body>
</html>
