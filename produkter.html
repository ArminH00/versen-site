<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f7f4">
<meta name="color-scheme" content="light">
<script>try{const p=localStorage.getItem("versenThemePreference")||"light";const d=p==="dark"||(p==="auto"&&matchMedia("(prefers-color-scheme: dark)").matches);document.documentElement.dataset.theme=d?"dark":"light";document.documentElement.dataset.themePreference=p;}catch(e){document.documentElement.dataset.theme="light";}</script>
<script>try{if(Date.now()<1777500000000&&!localStorage.getItem('versenLaunchAccess')&&!location.pathname.endsWith('/snart.html'))location.replace('snart.html?next='+encodeURIComponent((location.pathname.split('/').pop()||'index.html')+location.search+location.hash));}catch(e){}</script>
<title>Versen - Produkter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260509-request-polish">
</head>

<body class="auth-loading page-products">

<nav class="nav launch-nav">
  <button class="nav-mobile-menu" type="button" aria-label="Meny"></button>
  <a class="logo" href="index.html">VERSEN</a>
  <div class="menu" aria-label="Huvudmeny">
    <a class="active" href="produkter.html">Shop</a>
    <a href="medlemskap.html">Medlemskap</a>
    <a href="faq.html">Om oss</a>
  </div>
  <div class="nav-actions" aria-label="Snabbval">
    <a class="nav-icon nav-account" href="konto.html" aria-label="Konto"></a>
    <a class="nav-icon nav-wishlist" href="gillar.html" aria-label="Gillade"></a>
    <a class="nav-icon nav-cart" href="kundkorg.html" aria-label="Kundkorg"><span data-cart-count></span></a>
    <a class="nav-member-cta" href="medlemskap.html">Bli medlem</a>
  </div>
</nav>

<nav class="bottom-nav" aria-label="Mobilmeny">
  <a href="index.html" data-icon="home">Hem</a>
  <a class="active" href="produkter.html" data-icon="search">Shop</a>
  <a href="medlemskap.html" data-icon="club">Medlemskap</a>
  <a href="konto.html" data-icon="account">Konto</a>
</nav>

<main>
  <header class="page-hero fade">
    <div class="glow"></div>
    <div class="page-hero-content">
      <div class="badge">Shop</div>
      <h1>Alla produkter</h1>
      <p>Veckans priser, samlade i ett snabbt och enkelt flöde.</p>
    </div>
  </header>

  <section class="category-launch fade" aria-label="Veckans kategorier" data-category-launch>
    <div class="category-launch-header">
      <span>Veckans kategorier</span>
    </div>

    <button class="category-launch-card car-care active" type="button" data-category-select="Bilvård">
      <span>Veckans kategori</span>
      <strong>Bilvård</strong>
      <small data-category-count="Bilvård">Veckans urval</small>
      <div class="category-image-row" data-category-images="Bilvård"></div>
    </button>

    <button class="category-launch-card training-health" type="button" data-category-select="Träning & hälsa">
      <span>Veckans kategori</span>
      <strong>Träning & hälsa</strong>
      <small data-category-count="Träning & hälsa">Veckans urval</small>
      <div class="category-image-row" data-category-images="Träning & hälsa"></div>
    </button>

    <div class="shop-drop-countdown" aria-label="Nästa veckosläpp">
      <span>Nästa drop om</span>
      <strong data-drop-countdown>04d 02h 16m 38s</strong>
      <small>Veckans produkter, priser och drops samlade på ett ställe.</small>
    </div>
  </section>

  <section class="catalog-section fade" aria-label="Produktkatalog">
    <div class="catalog-tools">
      <div class="filter-row" aria-label="Kategorier" data-category-filters>
        <button class="filter active" type="button" data-filter="Bilvård">Bilvård</button>
        <button class="filter" type="button" data-filter="Träning & hälsa">Träning & hälsa</button>
      </div>

      <div class="sort-control" aria-label="Sortering">
        <button class="sort-pill active" type="button" data-sort="brand">Märke</button>
        <button class="sort-pill" type="button" data-sort="price">Pris</button>
      </div>
    </div>

    <div class="product-grid" data-products-grid>
      <div class="empty-state catalog-empty">
        <span>Laddar produkter</span>
        <p>Hämtar veckans priser.</p>
      </div>
    </div>
  </section>
</main>

<script src="script.js?v=20260509-request-polish"></script>
</body>
</html>
