<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050609">
<meta name="color-scheme" content="dark">
<script>try{if(!localStorage.getItem('versenLaunchAccess')&&!location.pathname.endsWith('/snart.html'))location.replace('snart.html?next='+encodeURIComponent((location.pathname.split('/').pop()||'index.html')+location.search+location.hash));}catch(e){}</script>
<title>Versen - Produkter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260428-launch-drops">
</head>

<body class="auth-loading">

<nav class="nav">
  <a class="logo" href="index.html">VERSEN</a>

  <div class="menu" aria-label="Huvudmeny">
    <a href="index.html">Hem</a>
    <a class="active" href="produkter.html">Produkter</a>
    <a href="medlemskap.html">Medlemskap</a>
    <a href="konto.html">Konto</a>
    <a href="kundkorg.html">Kundkorg <span data-cart-count></span></a>
  </div>
</nav>

<main>
  <header class="page-hero fade">
    <div class="glow"></div>
    <div class="page-hero-content">
      <div class="badge">Medlemskatalog</div>
      <h1>Veckans deals öppnas torsdag 12:00</h1>
      <p>Två riktningar just nu. Välj vad du vill handla och fyll kundkorgen med medlemspriser.</p>
    </div>
  </header>

  <section class="category-launch fade" aria-label="Veckans kategorier" data-category-launch>
    <button class="category-launch-card car-care" type="button" data-category-select="Bilvård">
      <span>Bilvård</span>
      <strong>Glans, tvätt och finish</strong>
      <small data-category-count="Bilvård">Veckans urval</small>
      <div class="category-image-row" data-category-images="Bilvård"></div>
    </button>

    <button class="category-launch-card training-health" type="button" data-category-select="Träning & hälsa">
      <span>Träning & hälsa</span>
      <strong>Dryck, protein och energi</strong>
      <small data-category-count="Träning & hälsa">Veckans urval</small>
      <div class="category-image-row" data-category-images="Träning & hälsa"></div>
    </button>
  </section>

  <section class="catalog-section fade" aria-label="Produktkatalog">
    <div class="catalog-tools">
      <div class="filter-row" aria-label="Filtrera produkter">
        <button class="filter" type="button" data-filter="Bilvård">Bilvård</button>
        <button class="filter" type="button" data-filter="Träning & hälsa">Träning & hälsa</button>
      </div>

      <div class="sort-control" aria-label="Sortering">
        <span>Sortera</span>
        <button class="sort-pill active" type="button">Populärast</button>
        <button class="sort-pill" type="button">Pris</button>
      </div>
    </div>

    <div class="product-grid" data-products-grid>
      <div class="empty-state catalog-empty">
        <span>Välj en kategori</span>
        <p>Bilvård eller Träning & hälsa. Produkterna visas direkt här.</p>
      </div>
    </div>
  </section>
</main>

<script src="script.js?v=20260428-launch-drops"></script>
</body>
</html>
