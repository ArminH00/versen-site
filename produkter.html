<script>try{const p=localStorage.getItem("versenThemePreference")||"light";const d=p==="dark"||(p==="auto"&&matchMedia("(prefers-color-scheme: dark)").matches);document.documentElement.dataset.theme=d?"dark":"light";document.documentElement.dataset.themePreference=p;}catch(e){document.documentElement.dataset.theme="light";}</script>
<script>try{if(Date.now()<1777500000000&&!localStorage.getItem('versenLaunchAccess')&&!location.pathname.endsWith('/snart.html'))location.replace('snart.html?next='+encodeURIComponent((location.pathname.split('/').pop()||'index.html')+location.search+location.hash));}catch(e){}</script>

</head>

<body class="auth-loading page-products">

    <a href="faq.html">Om oss</a>
  </div>
  <div class="nav-actions" aria-label="Snabbval">
    <a class="nav-icon nav-search" href="produkter.html" aria-label="Sök"></a>
    <a class="nav-icon nav-account" href="konto.html" aria-label="Konto"></a>
    <a class="nav-icon nav-wishlist" href="produkter.html" aria-label="Favoriter"></a>
    <a class="nav-icon nav-cart" href="kundkorg.html" aria-label="Kundkorg"><span data-cart-count></span></a>
    <a class="nav-member-cta" href="medlemskap.html">Bli medlem</a>
  </div>
</nav>

<nav class="bottom-nav" aria-label="Mobilmeny">

<main>
  <header class="page-hero fade">
    <div class="glow"></div>
    <div class="page-hero-content">
      <div class="badge">Shop</div>
      <h1>Alla produkter</h1>
      <p>Veckans priser, samlade i ett snabbt och enkelt flöde.</p>
    </div>
  </header>

  <section class="category-launch fade" aria-label="Veckans kategorier" data-category-launch>
    <div class="category-launch-header">
      <span>Veckans kategorier</span>
    </div>

    <button class="category-launch-card all-products active" type="button" data-category-select="Alla">
      <span>Alla</span>
      <strong>Alla</strong>
      <small data-category-count="Alla">Veckans urval</small>
      <div class="category-image-row" data-category-images="Alla"></div>
    </button>

    <button class="category-launch-card car-care" type="button" data-category-select="Tershine">
      <span>Tershine</span>
      <strong>Tershine</strong>
      <small data-category-count="Tershine">Veckans urval</small>
      <div class="category-image-row" data-category-images="Tershine"></div>
    </button>

    <button class="category-launch-card training-health" type="button" data-category-select="Gyeon">
      <span>Gyeon</span>
      <strong>Gyeon</strong>
      <small data-category-count="Gyeon">Veckans urval</small>
      <div class="category-image-row" data-category-images="Gyeon"></div>
    </button>

    <button class="category-launch-card" type="button" data-category-select="NOCCO">
      <span>NOCCO</span>
      <strong>NOCCO</strong>
      <small data-category-count="NOCCO">Veckans urval</small>
      <div class="category-image-row" data-category-images="NOCCO"></div>
    </button>

    <button class="category-launch-card" type="button" data-category-select="Barebells">
      <span>Barebells</span>
      <strong>Barebells</strong>
      <small data-category-count="Barebells">Veckans urval</small>
      <div class="category-image-row" data-category-images="Barebells"></div>
    </button>

    <button class="category-launch-card" type="button" data-category-select="Body Science">
      <span>Body Science</span>
      <strong>Body Science</strong>
      <small data-category-count="Body Science">Veckans urval</small>
      <div class="category-image-row" data-category-images="Body Science"></div>
    </button>
  </section>

  <section class="catalog-section fade" aria-label="Produktkatalog">
    <div class="catalog-tools">
      <div class="filter-row" aria-label="Kategorier" data-category-filters>
        <button class="filter active" type="button" data-filter="Alla">Alla</button>
        <button class="filter" type="button" data-filter="Tershine">Tershine</button>
        <button class="filter" type="button" data-filter="Gyeon">Gyeon</button>
        <button class="filter" type="button" data-filter="NOCCO">NOCCO</button>
        <button class="filter" type="button" data-filter="Barebells">Barebells</button>
        <button class="filter" type="button" data-filter="Body Science">Body Science</button>
      </div>

      <div class="sort-control" aria-label="Sortering">
        <span>Sortera: Mest populära</span>
        <button class="sort-pill active" type="button" data-sort="brand">Märke</button>
        <button class="sort-pill" type="button" data-sort="price">Pris</button>
      </div>
    </div>

    <div class="product-grid" data-products-grid>
      <div class="empty-state catalog-empty">
        <span>Laddar produkter</span>
        <p>Hämtar veckans priser.</p>
      </div>
    </div>
  </section>
</main>

<script src="script.js?v=20260509-product-polish"></script>
