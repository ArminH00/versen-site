<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050609">
<meta name="color-scheme" content="dark">
<title>Versen - Medlemskap aktiverat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body class="auth-loading">

<nav class="nav">
  <a class="logo" href="index.html">VERSEN</a>

  <div class="menu" aria-label="Huvudmeny">
    <a href="index.html">Hem</a>
    <a href="produkter.html">Produkter</a>
    <a class="active" href="medlemskap.html">Medlemskap</a>
    <a href="konto.html">Konto</a>
    <a href="kundkorg.html">Kundkorg <span data-cart-count></span></a>
  </div>
</nav>

<main>
  <section class="activation-stage fade" data-membership-activation>
    <div class="activation-glow"></div>
    <div class="activation-rings" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="activation-panel">
      <div class="badge" data-activation-badge>Väntar på betalning</div>
      <h1 data-activation-title>Slutför medlemskapet</h1>
      <p data-activation-copy>När betalningen är klar i Shopify aktiveras medlemskapet här automatiskt.</p>

      <div class="activation-orb" aria-hidden="true">
        <span></span>
      </div>

      <div class="activation-status" data-activation-status>
        <span>Status</span>
        <strong>Kontrollerar Shopify</strong>
        <p>Den här sidan uppdateras av sig själv. Stanna här efter att checkouten är klar.</p>
      </div>

      <div class="account-actions activation-actions" data-activation-actions>
        <button class="product-btn" type="button" data-refresh-membership>Kontrollera igen</button>
        <a class="product-btn secondary" href="medlemskap.html">Till medlemskap</a>
      </div>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
