<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#020304">
<meta name="color-scheme" content="light">
<script>try{const p=localStorage.getItem("versenThemePreference")||"light";const d=p==="dark"||(p==="auto"&&matchMedia("(prefers-color-scheme: dark)").matches);document.documentElement.dataset.theme=d?"dark":"light";document.documentElement.dataset.themePreference=p;}catch(e){document.documentElement.dataset.theme="light";}</script>
<title>Versen - Kommer snart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260510-plain-drop">
</head>

<body class="launch-body" data-no-footer="true">
<main class="launch-gate">
  <div class="launch-orbit" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <section class="launch-panel fade show" aria-label="Versen kommer snart">
    <p class="launch-kicker">VERSEN</p>
    <h1>Kommer snart.</h1>
    <p class="launch-copy">
      Medlemspriser på det du älskar. Låsta drops. En tystare butik öppnar snart.
    </p>

    <div class="launch-countdown" data-launch-countdown aria-label="Nedräkning till öppning">
      <div><strong>00</strong><span>dagar</span></div>
      <div><strong>00</strong><span>timmar</span></div>
      <div><strong>00</strong><span>min</span></div>
      <div><strong>00</strong><span>sek</span></div>
    </div>

    <div class="launch-lines" aria-hidden="true">
      <span>Öppnar torsdag 00:00</span>
      <span>Första vågen får förtur</span>
    </div>

    <form class="launch-form" data-launch-form>
      <label for="launch-email">Låt mig vara först</label>
      <div class="launch-input-row">
        <input id="launch-email" data-launch-input type="text" inputmode="email" autocomplete="email" placeholder="Email">
        <button type="submit">Klar</button>
      </div>
      <p class="form-message" data-launch-message></p>
    </form>
  </section>
</main>

<script src="script.js?v=20260510-plain-drop"></script>
</body>
</html>
